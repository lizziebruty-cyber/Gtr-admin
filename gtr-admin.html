<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GTR Admin Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; background: #fff0f8; font-family: 'DM Sans', sans-serif; }
    .header { background: #ff0099; padding: 44px 16px 18px; position: relative; overflow: hidden; }
    .header-star { position: absolute; top: -10px; right: -10px; opacity: 0.15; pointer-events: none; }
    .header-top { display: flex; align-items: center; gap: 10px; }
    .gtr-badge { background: white; border-radius: 10px; padding: 5px 10px; flex-shrink: 0; font-family: 'Black Han Sans', sans-serif; font-size: 16px; color: #ff0099; letter-spacing: 2px; }
    .header-title { color: white; font-weight: 700; font-size: 14px; }
    .header-sub { color: #ffb3e0; font-size: 11px; }
    .sync-spinner { width: 16px; height: 16px; border: 2px solid #ffffff44; border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: auto; display: none; }
    .sync-spinner.active { display: block; }
    .stats { display: flex; gap: 6px; margin-top: 14px; }
    .stat { flex: 1; background: rgba(255,255,255,0.18); border-radius: 10px; padding: 8px 4px; text-align: center; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; }
    .stat-value { color: white; font-weight: 700; font-size: 18px; }
    .stat-label { color: #ffb3e0; font-size: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    #content { padding: 14px 12px 120px; }
    .section-label { font-size: 10px; color: #cc0077; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .card { background: white; border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(255,0,153,0.06); }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 3px solid #ff0099; display: flex; z-index: 30; padding-bottom: env(safe-area-inset-bottom, 0px); }
    .tab-btn { flex: 1; padding: 10px 2px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700; cursor: pointer; color: #cc0077; text-transform: uppercase; border-top: 3px solid transparent; margin-top: -3px; }
    .tab-btn.active { color: #ff0099; border-top: 3px solid #ff0099; background: white; }
    .fab { position: fixed; bottom: 68px; right: 16px; background: #ff0099; border: none; color: white; width: 52px; height: 52px; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(255,0,153,0.4); z-index: 35; display: flex; align-items: center; justify-content: center; }
    .checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #ffb3e0; background: white; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .checkbox.checked { background: #ff0099; border-color: #ff0099; }
    .checkbox.checked::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
    .owner-tag { display: inline-block; background: #fff0f8; color: #cc0077; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
    .del-btn { background: none; border: none; color: #ffb3e0; font-size: 20px; cursor: pointer; padding: 4px 6px; line-height: 1; flex-shrink: 0; }
    .sm-btn { background: #fff0f8; color: #ff0099; border: 1.5px solid #ffb3e0; padding: 7px 14px; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .pink-btn { background: #ff0099; color: white; border: none; padding: 14px 20px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; width: 100%; margin-top: 4px; }
    .tasks-link { background: none; border: 1.5px solid #ffb3e0; color: #ff0099; padding: 6px 12px; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 11px; cursor: pointer; white-space: nowrap; }
    .vote-btn { background: #fff0f8; border: 2px solid #ffb3e0; color: #ff0099; font-weight: 700; font-size: 13px; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; flex-shrink: 0; }
    .event-task { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid rgba(255,179,224,0.15); }
    .event-task:last-child { border-bottom: none; }
    .task-done { text-decoration: line-through; opacity: 0.4; }
    .field-label { font-size: 11px; color: #cc0077; font-weight: 600; margin-bottom: 4px; margin-top: 12px; }
    .field-label:first-child { margin-top: 0; }
    .field-input { width: 100%; padding: 13px 14px; border: 2px solid #ffb3e0; border-radius: 10px; font-size: 16px; outline: none; background: white; color: #1a0010; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; display: block; }
    .field-input:focus { border-color: #ff0099; }
    .modal-overlay { position: fixed; inset: 0; z-index: 60; display: none; flex-direction: column; justify-content: flex-end; }
    .modal-overlay.open { display: flex; }
    .modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    .modal-sheet { position: relative; background: white; border-radius: 24px 24px 0 0; padding: 24px 20px; padding-bottom: env(safe-area-inset-bottom, 24px); max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .modal-handle { width: 40px; height: 4px; background: #ffb3e0; border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-family: 'Black Han Sans', sans-serif; color: #ff0099; font-size: 20px; margin-bottom: 18px; }
    .progress-bar { height: 4px; background: rgba(255,179,224,0.3); border-radius: 2px; overflow: hidden; margin-top: 10px; }
    .progress-fill { height: 100%; background: #ff0099; border-radius: 2px; transition: width 0.4s ease; }
    .filter-bar { background: white; border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1.5px solid #ffb3e0; }
    .saved-toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #ff0099; color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 100; white-space: nowrap; display: none; }
    .saved-toast.show { display: block; }
    .two-col { display: flex; gap: 8px; }
    .two-col .field-input { flex: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <svg class="header-star" width="60" height="60" viewBox="0 0 24 24" fill="white">
    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
  </svg>
  <div class="header-top">
    <div class="gtr-badge">GTR</div>
    <div style="flex:1">
      <div class="header-title">Admin Hub</div>
      <div class="header-sub">Girls That Run Winchester</div>
    </div>
    <div class="sync-spinner" id="spinner"></div>
  </div>
  <div class="stats">
    <button class="stat" onclick="setTab('tasks')">
      <div class="stat-value" id="stat-tasks">0</div>
      <div class="stat-label">Open tasks</div>
    </button>
    <button class="stat" onclick="setTab('events')">
      <div class="stat-value" id="stat-events">0</div>
      <div class="stat-label">Events</div>
    </button>
    <button class="stat" onclick="setTab('content')">
      <div class="stat-value" id="stat-content">0</div>
      <div class="stat-label">Posts due</div>
    </button>
    <button class="stat" onclick="setTab('ideas')">
      <div class="stat-value" id="stat-ideas">0</div>
      <div class="stat-label">Ideas</div>
    </button>
  </div>
</div>

<div id="content"></div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-tasks" onclick="setTab('tasks')"><div>✅</div><div>Tasks</div></button>
  <button class="tab-btn" id="tab-events" onclick="setTab('events')"><div>🗓️</div><div>Events</div></button>
  <button class="tab-btn" id="tab-content" onclick="setTab('content')"><div>📱</div><div>Content</div></button>
  <button class="tab-btn" id="tab-ideas" onclick="setTab('ideas')"><div>💡</div><div>Ideas</div></button>
</div>

<button class="fab" id="fab" onclick="toggleAdd()">+</button>

<!-- Add Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add task</div>
    <div id="modal-form"></div>
    <button class="pink-btn" onclick="submitAdd()">Add ⭐</button>
  </div>
</div>

<div class="saved-toast" id="toast">Saved ✓</div>

<script>
const SUPABASE_URL = "https://ohbceysswrkharkujsdz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oYmNleXNzd3JraGFya3Vqc2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NDUzMTYsImV4cCI6MjA5MDIyMTMxNn0.FHIPF1iwQuCpkSbILY_tPNBOvyQ_hRXjEARxUesej7E";
const TEAM = ["Lizzie", "Emily", "Holly"];
const STATUS_COLORS = {
  confirmed: "background:#e8fff5;color:#00aa66",
  planning: "background:#fff8e0;color:#cc8800",
  done: "background:#e8fff5;color:#00aa66",
  todo: "background:#fff0f8;color:#ff0099",
};

let data = {
  events: [
    { id: 1, title: "Summer Social", date: "2025-07-12", status: "confirmed", owner: "Lizzie", notes: "Venue booked, need to sort payment link", tasks: [
      { id: 101, task: "Set up payment link", owner: "Lizzie", due: "2025-07-03", done: false },
      { id: 102, task: "Design flyer", owner: "Holly", due: "2025-07-05", done: false },
      { id: 103, task: "Send WhatsApp announcement", owner: "Emily", due: "2025-07-07", done: false },
    ]},
    { id: 2, title: "5K Fun Run", date: "2025-07-20", status: "planning", owner: "Emily", notes: "Route TBC", tasks: [
      { id: 201, task: "Confirm route", owner: "Emily", due: "2025-07-10", done: false },
      { id: 202, task: "Post on Strava", owner: "Lizzie", due: "2025-07-12", done: false },
    ]},
  ],
  content: [
    { id: 1, date: "2025-07-07", platform: "Instagram", caption: "Sunday run recap 🌟", status: "done", owner: "Lizzie" },
    { id: 2, date: "2025-07-09", platform: "Instagram", caption: "Merch drop teaser", status: "todo", owner: "Holly" },
    { id: 3, date: "2025-07-11", platform: "WhatsApp", caption: "Social event reminder", status: "todo", owner: "Lizzie" },
  ],
  ideas: [
    { id: 1, text: "Couch to 5K programme for beginners", addedBy: "Emily", votes: 3 },
    { id: 2, text: "GTR x local café partnership", addedBy: "Lizzie", votes: 2 },
    { id: 3, text: "Monthly mile challenge with prizes", addedBy: "Holly", votes: 4 },
  ],
  tasks: [
    { id: 3, task: "Order merch samples", owner: "Emily", due: "2025-07-10", done: true, eventId: null },
  ],
};

let currentTab = "tasks";
let filterEvent = null;
let dbRowId = null;
let modalTab = "tasks";
let addingEventTask = null;

const fmt = (d) => {
  if (!d) return "TBC";
  return new Date(d + "T00:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short" });
};

const teamOptions = (selected) => TEAM.map(t => `<option${t === selected ? " selected" : ""}>${t}</option>`).join("");
const platformOptions = (selected) => ["Instagram","WhatsApp","TikTok","Stories"].map(p => `<option${p === selected ? " selected" : ""}>${p}</option>`).join("");

// DB
async function dbGet() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/gtr_data?select=*&limit=1`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  const rows = await res.json();
  return rows[0] || null;
}

async function dbSet(d) {
  const payload = { data: JSON.stringify(d) };
  if (dbRowId) {
    await fetch(`${SUPABASE_URL}/rest/v1/gtr_data?id=eq.${dbRowId}`, {
      method: "PATCH",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify(payload)
    });
  } else {
    await fetch(`${SUPABASE_URL}/rest/v1/gtr_data`, {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", Prefer: "return=minimal" },
      body: JSON.stringify(payload)
    });
  }
}

async function save() {
  document.getElementById("spinner").classList.add("active");
  try {
    await dbSet(data);
    showToast();
  } catch(e) { console.error(e); }
  document.getElementById("spinner").classList.remove("active");
}

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

// All tasks flat
function allTasks() {
  return [
    ...data.tasks,
    ...data.events.flatMap(e => (e.tasks||[]).map(t => ({...t, eventTitle: e.title, eventId: e.id})))
  ];
}

// Stats
function updateStats() {
  const tasks = allTasks();
  document.getElementById("stat-tasks").textContent = tasks.filter(t => !t.done).length;
  document.getElementById("stat-events").textContent = data.events.length;
  document.getElementById("stat-content").textContent = data.content.filter(c => c.status === "todo").length;
  document.getElementById("stat-ideas").textContent = data.ideas.length;
}

// Tab switching
function setTab(tab) {
  currentTab = tab;
  if (tab !== "tasks") filterEvent = null;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`tab-${tab}`).classList.add("active");
  render();
}

// Toggle task
function toggleTask(id, eventId) {
  if (eventId) {
    data.events = data.events.map(e => e.id === eventId
      ? {...e, tasks: e.tasks.map(t => t.id === id ? {...t, done: !t.done} : t)}
      : e
    );
  } else {
    data.tasks = data.tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  }
  save();
  render();
}

function deleteTask(id, eventId) {
  if (eventId) {
    data.events = data.events.map(e => e.id === eventId ? {...e, tasks: e.tasks.filter(t => t.id !== id)} : e);
  } else {
    data.tasks = data.tasks.filter(t => t.id !== id);
  }
  save(); render();
}

function deleteItem(section, id) {
  data[section] = data[section].filter(i => i.id !== id);
  save(); render();
}

function voteIdea(id) {
  data.ideas = data.ideas.map(i => i.id === id ? {...i, votes: i.votes + 1} : i);
  save(); render();
}

function goToEventTasks(eventId) {
  filterEvent = eventId;
  currentTab = "tasks";
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-tasks").classList.add("active");
  render();
}

function showAddEventTask(eventId) {
  addingEventTask = eventId;
  render();
  // Focus the input after render
  setTimeout(() => {
    const el = document.getElementById("new-event-task");
    if (el) el.focus();
  }, 50);
}

function cancelEventTask() {
  addingEventTask = null;
  render();
}

function submitEventTask(eventId) {
  const task = document.getElementById("new-event-task")?.value?.trim();
  const owner = document.getElementById("new-event-owner")?.value || "Lizzie";
  const due = document.getElementById("new-event-due")?.value || "";
  if (!task) return;
  data.events = data.events.map(e => e.id === eventId
    ? {...e, tasks: [...(e.tasks||[]), {id: Date.now(), task, owner, due, done: false}]}
    : e
  );
  addingEventTask = null;
  save(); render();
}

// Modal
function toggleAdd() {
  const modal = document.getElementById("modal");
  const fab = document.getElementById("fab");
  if (modal.classList.contains("open")) {
    closeModal();
  } else {
    modalTab = currentTab;
    modal.classList.add("open");
    fab.textContent = "×";
    document.body.style.overflow = "hidden";
    document.body.style.position = "fixed";
    document.body.style.width = "100%";
    renderModalForm();
    setTimeout(() => {
      const first = document.querySelector("#modal-form input, #modal-form select");
      if (first) first.focus();
    }, 100);
  }
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.getElementById("fab").textContent = "+";
  document.body.style.overflow = "";
  document.body.style.position = "";
  document.body.style.width = "";
}

function renderModalForm() {
  const titles = { tasks: "Add task", events: "Add event", content: "Add post", ideas: "Add idea" };
  document.getElementById("modal-title").textContent = titles[modalTab];
  let html = "";
  if (modalTab === "tasks") {
    html = `
      <p class="field-label">What needs doing?</p>
      <input id="f-task" class="field-input" placeholder="Task name">
      <p class="field-label">Who's doing it?</p>
      <select id="f-owner" class="field-input">${teamOptions("Lizzie")}</select>
      <p class="field-label">Due date</p>
      <input id="f-due" type="date" class="field-input">
    `;
  } else if (modalTab === "events") {
    html = `
      <p class="field-label">Event name</p>
      <input id="f-title" class="field-input" placeholder="e.g. Summer Social">
      <p class="field-label">Event date</p>
      <input id="f-date" type="date" class="field-input">
      <p class="field-label">Owner</p>
      <select id="f-owner" class="field-input">${teamOptions("Lizzie")}</select>
      <p class="field-label">Notes (optional)</p>
      <input id="f-notes" class="field-input" placeholder="Any extra info">
    `;
  } else if (modalTab === "content") {
    html = `
      <p class="field-label">Post caption</p>
      <input id="f-caption" class="field-input" placeholder="What's the post about?">
      <p class="field-label">Post date</p>
      <input id="f-date" type="date" class="field-input">
      <p class="field-label">Platform</p>
      <select id="f-platform" class="field-input">${platformOptions("Instagram")}</select>
      <p class="field-label">Owner</p>
      <select id="f-owner" class="field-input">${teamOptions("Lizzie")}</select>
    `;
  } else if (modalTab === "ideas") {
    html = `
      <p class="field-label">What's the idea?</p>
      <input id="f-text" class="field-input" placeholder="Drop it here...">
      <p class="field-label">Added by</p>
      <select id="f-addedBy" class="field-input">${teamOptions("Lizzie")}</select>
    `;
  }
  document.getElementById("modal-form").innerHTML = html;
}

function submitAdd() {
  const g = (id) => document.getElementById(id)?.value?.trim() || "";
  if (modalTab === "tasks") {
    const task = g("f-task");
    if (!task) return;
    data.tasks.push({ id: Date.now(), task, owner: g("f-owner") || "Lizzie", due: g("f-due"), done: false, eventId: null });
  } else if (modalTab === "events") {
    const title = g("f-title");
    if (!title) return;
    data.events.push({ id: Date.now(), title, date: g("f-date"), status: "planning", owner: g("f-owner") || "Lizzie", notes: g("f-notes"), tasks: [] });
  } else if (modalTab === "content") {
    const caption = g("f-caption");
    if (!caption) return;
    data.content.push({ id: Date.now(), date: g("f-date"), platform: g("f-platform") || "Instagram", caption, status: "todo", owner: g("f-owner") || "Lizzie" });
  } else if (modalTab === "ideas") {
    const text = g("f-text");
    if (!text) return;
    data.ideas.push({ id: Date.now(), text, addedBy: g("f-addedBy") || "Lizzie", votes: 0 });
  }
  closeModal();
  save(); render();
}

// Render
function render() {
  updateStats();
  const el = document.getElementById("content");
  let html = "";

  if (currentTab === "tasks") {
    const tasks = allTasks().sort((a, b) => a.done - b.done);
    const visible = filterEvent ? tasks.filter(t => t.eventId === filterEvent) : tasks;
    const filteredName = filterEvent ? data.events.find(e => e.id === filterEvent)?.title : null;

    if (filterEvent) {
      html += `<div class="filter-bar"><p style="font-size:12px;color:#ff0099;font-weight:600">📅 ${filteredName}</p><button class="sm-btn" onclick="filterEvent=null;render()">Show all</button></div>`;
    } else {
      html += `<p class="section-label">⭐ All tasks</p>`;
    }

    if (visible.length === 0) {
      html += `<div style="text-align:center;padding:40px 20px;color:#ccc"><p style="font-size:36px">✅</p><p style="font-size:14px;margin-top:8px">All done!</p></div>`;
    }

    visible.forEach(task => {
      html += `
        <div class="card" style="display:flex;align-items:flex-start;gap:10px;opacity:${task.done ? 0.65 : 1}">
          <div class="checkbox ${task.done ? 'checked' : ''}" onclick="toggleTask(${task.id}, ${task.eventId || 'null'})"></div>
          <div style="flex:1;min-width:0">
            <p style="font-weight:600;color:#1a0010;font-size:14px;${task.done ? 'text-decoration:line-through;opacity:0.4' : ''}">${task.task}</p>
            <div style="display:flex;gap:5px;margin-top:4px;align-items:center;flex-wrap:wrap">
              <span class="owner-tag">${task.owner}</span>
              ${task.due ? `<span style="font-size:10px;color:#bbb">due ${fmt(task.due)}</span>` : ''}
              ${task.eventTitle ? `<span style="font-size:10px;color:#ff0099;font-weight:600">📅 ${task.eventTitle}</span>` : ''}
            </div>
          </div>
          <button class="del-btn" onclick="deleteTask(${task.id}, ${task.eventId || 'null'})">×</button>
        </div>`;
    });

  } else if (currentTab === "events") {
    html += `<p class="section-label">🗓️ Events pipeline</p>`;
    data.events.forEach(event => {
      const done = (event.tasks||[]).filter(t => t.done).length;
      const total = (event.tasks||[]).length;
      const pct = total ? (done/total*100) : 0;
      const statusStyle = STATUS_COLORS[event.status] || "background:#fff0f8;color:#ff0099";

      html += `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;min-width:0">
            <p style="font-weight:700;color:#1a0010;font-size:15px">${event.title}</p>
            ${event.date ? `<p style="font-size:12px;color:#888;margin-top:2px">📅 ${fmt(event.date)}</p>` : ''}
            ${event.notes ? `<p style="font-size:11px;color:#aaa;margin-top:4px;font-style:italic">${event.notes}</p>` : ''}
            <div style="display:flex;gap:5px;margin-top:6px;align-items:center;flex-wrap:wrap">
              <span class="badge" style="${statusStyle}">${event.status}</span>
              <span class="owner-tag">${event.owner}</span>
            </div>
          </div>
          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
            <button class="tasks-link" onclick="goToEventTasks(${event.id})">${done}/${total} tasks</button>
            <button class="del-btn" onclick="deleteItem('events', ${event.id})">×</button>
          </div>
        </div>
        ${total > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>` : ''}
        <div style="margin-top:12px;border-top:1.5px solid #fff0f8;padding-top:10px">
          ${(event.tasks||[]).length === 0 ? '<p style="font-size:11px;color:#ccc;font-style:italic;margin-bottom:6px">No tasks yet</p>' : ''}
          ${(event.tasks||[]).map(t => `
            <div class="event-task">
              <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id}, ${event.id})"></div>
              <div style="flex:1;min-width:0">
                <p style="font-size:13px;font-weight:600;color:#1a0010;${t.done ? 'text-decoration:line-through;opacity:0.4' : ''}">${t.task}</p>
                <div style="display:flex;gap:5px;margin-top:2px;flex-wrap:wrap">
                  <span class="owner-tag">${t.owner}</span>
                  ${t.due ? `<span style="font-size:10px;color:#bbb">due ${fmt(t.due)}</span>` : ''}
                </div>
              </div>
              <button class="del-btn" onclick="deleteTask(${t.id}, ${event.id})">×</button>
            </div>
          `).join('')}
          ${addingEventTask === event.id ? `
            <div style="margin-top:10px;display:flex;flex-direction:column;gap:10px">
              <input id="new-event-task" class="field-input" placeholder="Task name">
              <div style="display:flex;gap:8px">
                <select id="new-event-owner" class="field-input">${teamOptions("Lizzie")}</select>
                <input id="new-event-due" type="date" class="field-input">
              </div>
              <div style="display:flex;gap:8px">
                <button class="pink-btn" style="font-size:14px;padding:11px;margin-top:0" onclick="submitEventTask(${event.id})">Add ⭐</button>
                <button class="sm-btn" onclick="cancelEventTask()">Cancel</button>
              </div>
            </div>
          ` : `<button class="sm-btn" style="margin-top:10px" onclick="showAddEventTask(${event.id})">+ Add task</button>`}
        </div>
      </div>`;
    });

  } else if (currentTab === "content") {
    html += `<p class="section-label">📱 Content calendar</p>`;
    data.content.forEach(post => {
      const statusStyle = STATUS_COLORS[post.status] || "background:#fff0f8;color:#ff0099";
      html += `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap">
              ${post.date ? `<span style="font-size:10px;color:#888;font-weight:600">${fmt(post.date)}</span>` : ''}
              <span style="background:#fff0f8;color:#ff0099;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px">${post.platform}</span>
              <span class="badge" style="${statusStyle}">${post.status}</span>
            </div>
            <p style="font-weight:600;color:#1a0010;font-size:13px">${post.caption}</p>
            <span class="owner-tag" style="margin-top:5px;display:inline-block">${post.owner}</span>
          </div>
          <button class="del-btn" onclick="deleteItem('content', ${post.id})">×</button>
        </div>
      </div>`;
    });

  } else if (currentTab === "ideas") {
    html += `<p class="section-label">💡 Ideas — vote for your faves!</p>`;
    [...data.ideas].sort((a, b) => b.votes - a.votes).forEach(idea => {
      html += `<div class="card" style="display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">
          <p style="font-weight:600;color:#1a0010;font-size:14px">${idea.text}</p>
          <span class="owner-tag" style="margin-top:4px;display:inline-block">💡 ${idea.addedBy}</span>
        </div>
        <button class="vote-btn" onclick="voteIdea(${idea.id})">▲ ${idea.votes}</button>
        <button class="del-btn" onclick="deleteItem('ideas', ${idea.id})">×</button>
      </div>`;
    });
  }

  el.innerHTML = html;
}

// Init
async function init() {
  try {
    const row = await dbGet();
    if (row) {
      dbRowId = row.id;
      if (row.data) data = JSON.parse(row.data);
    }
  } catch(e) { console.error(e); }
  render();
  setInterval(async () => {
    try {
      const row = await dbGet();
      if (row?.data) { data = JSON.parse(row.data); render(); }
    } catch {}
  }, 30000);
}

init();
</script>
</body>
</html>
