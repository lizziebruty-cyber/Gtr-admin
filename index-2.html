<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>GTR Admin Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; width: 100%; overflow-x: hidden; background: #fff0f8; font-family: 'DM Sans', sans-serif; }
    .header { background: #ff0099; padding: 44px 16px 18px; position: relative; overflow: hidden; }
    .gtr-badge { background: white; border-radius: 10px; padding: 5px 10px; flex-shrink: 0; font-family: 'Black Han Sans', sans-serif; font-size: 16px; color: #ff0099; letter-spacing: 2px; display: inline-block; }
    .stats { display: flex; gap: 6px; margin-top: 14px; }
    .stat { flex: 1; background: rgba(255,255,255,0.18); border-radius: 10px; padding: 8px 4px; text-align: center; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; }
    .stat-value { color: white; font-weight: 700; font-size: 18px; }
    .stat-label { color: #ffb3e0; font-size: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    #content { padding: 14px 12px 120px; }
    .section-label { font-size: 10px; color: #cc0077; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
    .section-label.grey { color: #bbb; margin-top: 20px; }
    .card { background: white; border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(255,0,153,0.06); }
    .card.overdue { border-left: 3px solid #ff0099; }
    .card.archived { opacity: 0.6; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 3px solid #ff0099; display: flex; z-index: 30; padding-bottom: env(safe-area-inset-bottom, 0px); }
    .tab-btn { flex: 1; padding: 10px 2px; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700; cursor: pointer; color: #cc0077; text-transform: uppercase; border-top: 3px solid transparent; margin-top: -3px; }
    .tab-btn.active { color: #ff0099; border-top: 3px solid #ff0099; background: white; }
    .fab { position: fixed; bottom: 68px; right: 16px; background: #ff0099; border: none; color: white; width: 52px; height: 52px; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(255,0,153,0.4); z-index: 35; display: flex; align-items: center; justify-content: center; }
    .checkbox { width: 20px; height: 20px; border-radius: 6px; border: 2px solid #ffb3e0; background: white; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .checkbox.checked { background: #ff0099; border-color: #ff0099; }
    .checkbox.checked::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
    .owner-tag { display: inline-block; background: #fff0f8; color: #cc0077; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
    .del-btn { background: none; border: none; color: #ffb3e0; font-size: 18px; cursor: pointer; padding: 4px 5px; line-height: 1; flex-shrink: 0; }
    .edit-btn { background: none; border: none; color: #ffb3e0; font-size: 14px; cursor: pointer; padding: 4px 5px; line-height: 1; flex-shrink: 0; }
    .edit-btn:hover { color: #ff0099; }
    .sm-btn { background: #fff0f8; color: #ff0099; border: 1.5px solid #ffb3e0; padding: 7px 14px; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .pink-btn { background: #ff0099; color: white; border: none; padding: 14px 20px; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; width: 100%; }
    .tasks-link { background: none; border: 1.5px solid #ffb3e0; color: #ff0099; padding: 6px 12px; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 11px; cursor: pointer; white-space: nowrap; }
    .vote-btn { background: #fff0f8; border: 2px solid #ffb3e0; color: #ff0099; font-weight: 700; font-size: 13px; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; flex-shrink: 0; }
    .event-task { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid rgba(255,179,224,0.15); }
    .event-task:last-child { border-bottom: none; }
    .fi { width: 100%; padding: 13px 14px; border: 2px solid #ffb3e0; border-radius: 10px; font-size: 16px; outline: none; background: white; color: #1a0010; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; display: block; margin-top: 4px; }
    .fi:focus { border-color: #ff0099; }
    .fl { font-size: 11px; color: #cc0077; font-weight: 600; margin-top: 12px; display: block; }
    .fl:first-child { margin-top: 0; }
    .modal-overlay { position: fixed; inset: 0; z-index: 60; display: none; flex-direction: column; justify-content: flex-end; }
    .modal-overlay.open { display: flex; }
    .modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    .modal-sheet { position: relative; background: white; border-radius: 24px 24px 0 0; padding: 24px 20px; padding-bottom: env(safe-area-inset-bottom, 24px); max-height: 85vh; overflow-y: auto; }
    .modal-handle { width: 40px; height: 4px; background: #ffb3e0; border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-family: 'Black Han Sans', sans-serif; color: #ff0099; font-size: 20px; margin-bottom: 18px; }
    .progress-bar { height: 4px; background: rgba(255,179,224,0.3); border-radius: 2px; overflow: hidden; margin-top: 10px; }
    .progress-fill { height: 100%; background: #ff0099; border-radius: 2px; }
    .filter-bar { background: white; border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1.5px solid #ffb3e0; }
    .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #ff0099; color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 100; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .status-flow { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
    .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; cursor: pointer; border: 1.5px solid transparent; }
    .status-pill.active { border-color: currentColor; }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn-row .pink-btn { margin-top: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="gtr-badge">GTR</div>
    <div style="flex:1">
      <div style="color:white;font-weight:700;font-size:14px">Admin Hub</div>
      <div style="color:#ffb3e0;font-size:11px">Girls That Run Winchester</div>
    </div>
    <div id="spinner" style="display:none;width:16px;height:16px;border:2px solid #ffffff44;border-top:2px solid white;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  </div>
  <div class="stats">
    <button class="stat" onclick="goTab('tasks')"><div class="stat-value" id="st0">0</div><div class="stat-label">Open tasks</div></button>
    <button class="stat" onclick="goTab('events')"><div class="stat-value" id="st1">0</div><div class="stat-label">Events</div></button>
    <button class="stat" onclick="goTab('content')"><div class="stat-value" id="st2">0</div><div class="stat-label">Posts due</div></button>
    <button class="stat" onclick="goTab('ideas')"><div class="stat-value" id="st3">0</div><div class="stat-label">Ideas</div></button>
  </div>
</div>

<div id="content"></div>

<div class="tab-bar">
  <button class="tab-btn active" id="tb-tasks" onclick="goTab('tasks')"><div>✅</div><div>Tasks</div></button>
  <button class="tab-btn" id="tb-events" onclick="goTab('events')"><div>🗓️</div><div>Events</div></button>
  <button class="tab-btn" id="tb-content" onclick="goTab('content')"><div>📱</div><div>Content</div></button>
  <button class="tab-btn" id="tb-ideas" onclick="goTab('ideas')"><div>💡</div><div>Ideas</div></button>
</div>

<button class="fab" id="fab" onclick="openModal()">+</button>
<div class="toast" id="toast">Saved ✓</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add</div>

    <div id="form-tasks" style="display:none">
      <label class="fl">What needs doing?</label>
      <input id="f-task" class="fi" placeholder="Task name" type="text" autocomplete="off">
      <label class="fl">Who's doing it?</label>
      <select id="f-owner" class="fi"></select>
      <label class="fl">Due date</label>
      <input id="f-due" class="fi" type="date">
      <label class="fl">Notes (optional)</label>
      <input id="f-notes" class="fi" placeholder="Any extra context or links" type="text" autocomplete="off">
      <div class="btn-row">
        <button class="pink-btn" onclick="submitModal()">Save ⭐</button>
      </div>
    </div>

    <div id="form-events" style="display:none">
      <label class="fl">Event name</label>
      <input id="f-title" class="fi" placeholder="e.g. Summer Social" type="text" autocomplete="off">
      <label class="fl">Event date</label>
      <input id="f-date" class="fi" type="date">
      <label class="fl">Status</label>
      <select id="f-estatus" class="fi">
        <option>planning</option><option>confirmed</option>
      </select>
      <label class="fl">Owner</label>
      <select id="f-eowner" class="fi"></select>
      <label class="fl">Notes (optional)</label>
      <input id="f-enotes" class="fi" placeholder="Any extra info" type="text" autocomplete="off">
      <div class="btn-row">
        <button class="pink-btn" onclick="submitModal()">Save ⭐</button>
      </div>
    </div>

    <div id="form-content" style="display:none">
      <label class="fl">Post caption</label>
      <input id="f-caption" class="fi" placeholder="What's the post about?" type="text" autocomplete="off">
      <label class="fl">Post date</label>
      <input id="f-cdate" class="fi" type="date">
      <label class="fl">Platform</label>
      <select id="f-platform" class="fi">
        <option>Instagram</option><option>WhatsApp</option><option>TikTok</option><option>Stories</option>
      </select>
      <label class="fl">Status</label>
      <select id="f-cstatus" class="fi">
        <option>draft</option><option>scheduled</option><option>published</option>
      </select>
      <label class="fl">Owner</label>
      <select id="f-cowner" class="fi"></select>
      <div class="btn-row">
        <button class="pink-btn" onclick="submitModal()">Save ⭐</button>
      </div>
    </div>

    <div id="form-ideas" style="display:none">
      <label class="fl">What's the idea?</label>
      <input id="f-text" class="fi" placeholder="Drop it here..." type="text" autocomplete="off">
      <label class="fl">Added by</label>
      <select id="f-iowner" class="fi"></select>
      <div class="btn-row">
        <button class="pink-btn" onclick="submitModal()">Save ⭐</button>
      </div>
    </div>
  </div>
</div>

<!-- Event task modal -->
<div class="modal-overlay" id="et-modal">
  <div class="modal-bg" onclick="closeEtModal()"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="et-modal-title">Add task</div>
    <label class="fl" style="margin-top:0">Task name</label>
    <input id="et-task" class="fi" placeholder="What needs doing?" type="text" autocomplete="off">
    <label class="fl">Who's doing it?</label>
    <select id="et-owner" class="fi"></select>
    <label class="fl">Due date</label>
    <input id="et-due" class="fi" type="date">
    <label class="fl">Notes (optional)</label>
    <input id="et-notes" class="fi" placeholder="Any extra context" type="text" autocomplete="off">
    <div class="btn-row" style="margin-top:16px">
      <button class="pink-btn" onclick="submitEtModal()">Save ⭐</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ohbceysswrkharkujsdz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9oYmNleXNzd3JraGFya3Vqc2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NDUzMTYsImV4cCI6MjA5MDIyMTMxNn0.FHIPF1iwQuCpkSbILY_tPNBOvyQ_hRXjEARxUesej7E";
const TEAM = ["Lizzie","Emily","Holly"];
const POST_STATUSES = ["draft","scheduled","published"];
const POST_STATUS_STYLES = {
  draft:"background:#f0f0f0;color:#888",
  scheduled:"background:#fff8e0;color:#cc8800",
  published:"background:#e8fff5;color:#00aa66"
};
const EVENT_STATUS_COLORS = {
  confirmed:"background:#e8fff5;color:#00aa66",
  planning:"background:#fff8e0;color:#cc8800",
};

let data = {
  events:[
    {id:1,title:"Summer Social",date:"2025-07-12",status:"confirmed",owner:"Lizzie",notes:"Venue booked, need to sort payment link",archived:false,tasks:[
      {id:101,task:"Set up payment link",owner:"Lizzie",due:"2025-07-03",done:false,notes:""},
      {id:102,task:"Design flyer",owner:"Holly",due:"2025-07-05",done:false,notes:""},
      {id:103,task:"Send WhatsApp announcement",owner:"Emily",due:"2025-07-07",done:false,notes:""},
    ]},
    {id:2,title:"5K Fun Run",date:"2025-07-20",status:"planning",owner:"Emily",notes:"Route TBC",archived:false,tasks:[
      {id:201,task:"Confirm route",owner:"Emily",due:"2025-07-10",done:false,notes:""},
      {id:202,task:"Post on Strava",owner:"Lizzie",due:"2025-07-12",done:false,notes:""},
    ]},
  ],
  content:[
    {id:1,date:"2025-07-07",platform:"Instagram",caption:"Sunday run recap 🌟",status:"published",owner:"Lizzie"},
    {id:2,date:"2025-07-09",platform:"Instagram",caption:"Merch drop teaser",status:"draft",owner:"Holly"},
    {id:3,date:"2025-07-11",platform:"WhatsApp",caption:"Social event reminder",status:"scheduled",owner:"Lizzie"},
  ],
  ideas:[
    {id:1,text:"Couch to 5K programme for beginners",addedBy:"Emily",votes:3},
    {id:2,text:"GTR x local café partnership",addedBy:"Lizzie",votes:2},
    {id:3,text:"Monthly mile challenge with prizes",addedBy:"Holly",votes:4},
  ],
  tasks:[
    {id:3,task:"Order merch samples",owner:"Emily",due:"2025-07-10",done:true,eventId:null,notes:""},
  ],
};

let tab = "tasks";
let filterEvent = null;
let dbRowId = null;
let modalTab = "tasks";
let editingId = null; // null = adding new, otherwise = editing existing
let etEventId = null;
let etEditingId = null; // null = adding new event task, otherwise = editing existing

const fmt = d => d ? new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"}) : "TBC";
const teamOpts = (sel="Lizzie") => TEAM.map(t=>`<option${t===sel?" selected":""}>${t}</option>`).join("");
const today = () => new Date().toISOString().split("T")[0];
const isPast = date => date && date < today();

async function dbGet() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/gtr_data?select=*&limit=1`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});
  const rows = await r.json();
  return rows[0]||null;
}
async function dbSet(d) {
  const payload={data:JSON.stringify(d)};
  if(dbRowId) {
    await fetch(`${SUPABASE_URL}/rest/v1/gtr_data?id=eq.${dbRowId}`,{method:"PATCH",headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify(payload)});
  } else {
    await fetch(`${SUPABASE_URL}/rest/v1/gtr_data`,{method:"POST",headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify(payload)});
  }
}
async function save() {
  document.getElementById("spinner").style.display="block";
  try{await dbSet(data);showToast();}catch(e){console.error(e);}
  document.getElementById("spinner").style.display="none";
}
function showToast(){const t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1500);}

function allTasks() {
  const contentTasks = data.content
    .filter(p=>p.status!=="published")
    .map(p=>({id:`post-${p.id}`,task:`Post: ${p.caption}`,owner:p.owner,due:p.date,done:false,notes:p.platform,eventId:null,isPost:true,postId:p.id}));
  return [...data.tasks,...data.events.flatMap(e=>(e.tasks||[]).map(t=>({...t,eventTitle:e.title,eventId:e.id}))),...contentTasks];
}

function updateStats(){
  const tasks=allTasks();
  document.getElementById("st0").textContent=tasks.filter(t=>!t.done).length;
  document.getElementById("st1").textContent=data.events.filter(e=>!e.archived).length;
  document.getElementById("st2").textContent=data.content.filter(c=>c.status!=="published").length;
  document.getElementById("st3").textContent=data.ideas.length;
}

function goTab(t){
  tab=t;if(t!=="tasks")filterEvent=null;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(`tb-${t}`).classList.add("active");
  render();
}

function toggleTask(id,eventId){
  if(typeof id==="string"&&id.startsWith("post-")){
    const postId=parseInt(id.replace("post-",""));
    data.content=data.content.map(p=>p.id===postId?{...p,status:p.status==="published"?"scheduled":"published"}:p);
  } else if(eventId){
    data.events=data.events.map(e=>e.id===eventId?{...e,tasks:e.tasks.map(t=>t.id===id?{...t,done:!t.done}:t)}:e);
  } else {
    data.tasks=data.tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  }
  save();render();
}
function deleteTask(id,eventId){
  if(eventId)data.events=data.events.map(e=>e.id===eventId?{...e,tasks:e.tasks.filter(t=>t.id!==id)}:e);
  else data.tasks=data.tasks.filter(t=>t.id!==id);
  save();render();
}
function deleteItem(section,id){data[section]=data[section].filter(i=>i.id!==id);save();render();}
function voteIdea(id){data.ideas=data.ideas.map(i=>i.id===id?{...i,votes:i.votes+1}:i);save();render();}
function goToEventTasks(eventId){filterEvent=eventId;tab="tasks";document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));document.getElementById("tb-tasks").classList.add("active");render();}
function archiveEvent(id){data.events=data.events.map(e=>e.id===id?{...e,archived:true}:e);save();render();}
function unarchiveEvent(id){data.events=data.events.map(e=>e.id===id?{...e,archived:false}:e);save();render();}
function cyclePostStatus(id){
  data.content=data.content.map(p=>{if(p.id!==id)return p;const idx=POST_STATUSES.indexOf(p.status);return{...p,status:POST_STATUSES[(idx+1)%POST_STATUSES.length]};});
  save();render();
}

// ---- MODAL ----
function setVal(id,val){const el=document.getElementById(id);if(el)el.value=val||"";}

function openModal(type, existingId){
  modalTab = type || tab;
  editingId = existingId || null;
  const isEdit = !!editingId;
  document.getElementById("modal-title").textContent = isEdit
    ? {tasks:"Edit task",events:"Edit event",content:"Edit post",ideas:"Edit idea"}[modalTab]
    : {tasks:"Add task",events:"Add event",content:"Add post",ideas:"Add idea"}[modalTab];

  ["tasks","events","content","ideas"].forEach(t=>{
    document.getElementById(`form-${t}`).style.display=t===modalTab?"block":"none";
  });

  // Pre-fill if editing
  if(isEdit){
    if(modalTab==="tasks"){
      const item=data.tasks.find(t=>t.id===editingId);
      if(item){setVal("f-task",item.task);setVal("f-owner",item.owner);setVal("f-due",item.due);setVal("f-notes",item.notes);}
    } else if(modalTab==="events"){
      const item=data.events.find(e=>e.id===editingId);
      if(item){setVal("f-title",item.title);setVal("f-date",item.date);setVal("f-estatus",item.status);setVal("f-eowner",item.owner);setVal("f-enotes",item.notes);}
    } else if(modalTab==="content"){
      const item=data.content.find(p=>p.id===editingId);
      if(item){setVal("f-caption",item.caption);setVal("f-cdate",item.date);setVal("f-platform",item.platform);setVal("f-cstatus",item.status);setVal("f-cowner",item.owner);}
    } else if(modalTab==="ideas"){
      const item=data.ideas.find(i=>i.id===editingId);
      if(item){setVal("f-text",item.text);setVal("f-iowner",item.addedBy);}
    }
  } else {
    // Clear
    ["f-task","f-title","f-enotes","f-notes","f-caption","f-text"].forEach(id=>{setVal(id,"");});
    ["f-due","f-date","f-cdate"].forEach(id=>{setVal(id,"");});
  }

  document.getElementById("modal").classList.add("open");
  document.body.style.overflow="hidden";document.body.style.position="fixed";document.body.style.width="100%";
  setTimeout(()=>{const first=document.querySelector(`#form-${modalTab} input, #form-${modalTab} select`);if(first)first.focus();},100);
}

function closeModal(){
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow="";document.body.style.position="";document.body.style.width="";
}

function submitModal(){
  const g=id=>(document.getElementById(id)||{}).value||"";
  if(modalTab==="tasks"){
    const task=g("f-task").trim();if(!task)return;
    if(editingId){
      data.tasks=data.tasks.map(t=>t.id===editingId?{...t,task,owner:g("f-owner"),due:g("f-due"),notes:g("f-notes")}:t);
    } else {
      data.tasks.push({id:Date.now(),task,owner:g("f-owner")||"Lizzie",due:g("f-due"),done:false,eventId:null,notes:g("f-notes")});
    }
  } else if(modalTab==="events"){
    const title=g("f-title").trim();if(!title)return;
    if(editingId){
      data.events=data.events.map(e=>e.id===editingId?{...e,title,date:g("f-date"),status:g("f-estatus"),owner:g("f-eowner"),notes:g("f-enotes")}:e);
    } else {
      data.events.push({id:Date.now(),title,date:g("f-date"),status:g("f-estatus")||"planning",owner:g("f-eowner")||"Lizzie",notes:g("f-enotes"),archived:false,tasks:[]});
    }
  } else if(modalTab==="content"){
    const caption=g("f-caption").trim();if(!caption)return;
    if(editingId){
      data.content=data.content.map(p=>p.id===editingId?{...p,caption,date:g("f-cdate"),platform:g("f-platform"),status:g("f-cstatus"),owner:g("f-cowner")}:p);
    } else {
      data.content.push({id:Date.now(),date:g("f-cdate"),platform:g("f-platform")||"Instagram",caption,status:g("f-cstatus")||"draft",owner:g("f-cowner")||"Lizzie"});
    }
  } else if(modalTab==="ideas"){
    const text=g("f-text").trim();if(!text)return;
    if(editingId){
      data.ideas=data.ideas.map(i=>i.id===editingId?{...i,text,addedBy:g("f-iowner")}:i);
    } else {
      data.ideas.push({id:Date.now(),text,addedBy:g("f-iowner")||"Lizzie",votes:0});
    }
  }
  closeModal();save();render();
}

// ---- EVENT TASK MODAL ----
function openEtModal(eventId, existingTaskId){
  etEventId=eventId;
  etEditingId=existingTaskId||null;
  const isEdit=!!etEditingId;
  document.getElementById("et-modal-title").textContent=isEdit?"Edit task":"Add task";
  if(isEdit){
    const event=data.events.find(e=>e.id===eventId);
    const task=event?.tasks?.find(t=>t.id===etEditingId);
    if(task){setVal("et-task",task.task);setVal("et-owner",task.owner);setVal("et-due",task.due);setVal("et-notes",task.notes);}
  } else {
    setVal("et-task","");setVal("et-due","");setVal("et-notes","");
  }
  document.getElementById("et-modal").classList.add("open");
  document.body.style.overflow="hidden";document.body.style.position="fixed";document.body.style.width="100%";
  setTimeout(()=>document.getElementById("et-task").focus(),100);
}
function closeEtModal(){
  document.getElementById("et-modal").classList.remove("open");
  document.body.style.overflow="";document.body.style.position="";document.body.style.width="";
}
function submitEtModal(){
  const task=document.getElementById("et-task").value.trim();if(!task)return;
  const owner=document.getElementById("et-owner").value||"Lizzie";
  const due=document.getElementById("et-due").value||"";
  const notes=document.getElementById("et-notes").value||"";
  if(etEditingId){
    data.events=data.events.map(e=>e.id===etEventId?{...e,tasks:e.tasks.map(t=>t.id===etEditingId?{...t,task,owner,due,notes}:t)}:e);
  } else {
    data.events=data.events.map(e=>e.id===etEventId?{...e,tasks:[...(e.tasks||[]),{id:Date.now(),task,owner,due,done:false,notes}]}:e);
  }
  closeEtModal();save();render();
}

// ---- RENDER ----
function render(){
  updateStats();
  const todayStr=today();
  let html="";

  if(tab==="tasks"){
    const tasks=allTasks().sort((a,b)=>{if(a.done!==b.done)return a.done-b.done;if(a.due&&b.due)return a.due.localeCompare(b.due);return 0;});
    const visible=filterEvent?tasks.filter(t=>t.eventId===filterEvent):tasks;
    const fname=filterEvent?data.events.find(e=>e.id===filterEvent)?.title:null;
    if(filterEvent)html+=`<div class="filter-bar"><p style="font-size:12px;color:#ff0099;font-weight:600">📅 ${fname}</p><button class="sm-btn" onclick="filterEvent=null;render()">Show all</button></div>`;
    else html+=`<p class="section-label">⭐ All tasks</p>`;
    if(!visible.length)html+=`<div style="text-align:center;padding:40px 20px;color:#ccc"><p style="font-size:36px">✅</p><p style="font-size:14px;margin-top:8px">All done!</p></div>`;
    visible.forEach(t=>{
      const overdue=!t.done&&t.due&&t.due<todayStr;
      html+=`<div class="card${overdue?" overdue":""}" style="display:flex;align-items:flex-start;gap:8px;opacity:${t.done?.65:1}">
        <div class="checkbox${t.done?" checked":""}" onclick="toggleTask('${t.id}',${t.eventId||"null"})"></div>
        <div style="flex:1;min-width:0">
          <p style="font-weight:600;color:#1a0010;font-size:14px;${t.done?"text-decoration:line-through;opacity:.4":""}">${t.task}</p>
          <div style="display:flex;gap:5px;margin-top:4px;align-items:center;flex-wrap:wrap">
            <span class="owner-tag">${t.owner}</span>
            ${t.due?`<span style="font-size:10px;color:${overdue?"#ff0099;font-weight:700":"#bbb"}">${overdue?"⚠️ ":""}due ${fmt(t.due)}</span>`:""}
            ${t.eventTitle?`<span style="font-size:10px;color:#ff0099;font-weight:600">📅 ${t.eventTitle}</span>`:""}
            ${t.isPost?`<span style="font-size:10px;background:#fff0f8;color:#ff0099;font-weight:600;padding:2px 7px;border-radius:8px">📱 ${t.notes}</span>`:""}
          </div>
          ${t.notes&&!t.isPost?`<p style="font-size:11px;color:#aaa;margin-top:4px;font-style:italic">${t.notes}</p>`:""}
        </div>
        ${!t.isPost?`<button class="edit-btn" onclick="openModal('tasks',${t.id})">✏️</button>
        <button class="del-btn" onclick="deleteTask('${t.id}',${t.eventId||"null"})">×</button>`:""}
      </div>`;
    });

  } else if(tab==="events"){
    const active=data.events.filter(e=>!e.archived);
    const archived=data.events.filter(e=>e.archived);
    html+=`<p class="section-label">🗓️ Events pipeline</p>`;

    const renderEvent=(event,isArchived)=>{
      const done=(event.tasks||[]).filter(t=>t.done).length;
      const total=(event.tasks||[]).length;
      const sc=EVENT_STATUS_COLORS[event.status]||"background:#fff0f8;color:#ff0099";
      const pastEvent=isPast(event.date);
      return `<div class="card${isArchived?" archived":""}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;min-width:0">
            <p style="font-weight:700;color:#1a0010;font-size:15px">${event.title}</p>
            ${event.date?`<p style="font-size:12px;color:#888;margin-top:2px">📅 ${fmt(event.date)}</p>`:""}
            ${event.notes?`<p style="font-size:11px;color:#aaa;margin-top:4px;font-style:italic">${event.notes}</p>`:""}
            <div style="display:flex;gap:5px;margin-top:6px;align-items:center;flex-wrap:wrap">
              <span class="badge" style="${sc}">${event.status}</span>
              <span class="owner-tag">${event.owner}</span>
              ${pastEvent&&!isArchived?`<button class="sm-btn" style="font-size:10px;padding:3px 8px" onclick="archiveEvent(${event.id})">Move to old</button>`:""}
              ${isArchived?`<button class="sm-btn" style="font-size:10px;padding:3px 8px" onclick="unarchiveEvent(${event.id})">Restore</button>`:""}
            </div>
          </div>
          <div style="display:flex;gap:2px;align-items:center;flex-shrink:0">
            ${!isArchived?`<button class="tasks-link" onclick="goToEventTasks(${event.id})">${done}/${total} tasks</button>`:""}
            <button class="edit-btn" onclick="openModal('events',${event.id})">✏️</button>
            <button class="del-btn" onclick="deleteItem('events',${event.id})">×</button>
          </div>
        </div>
        ${total&&!isArchived?`<div class="progress-bar"><div class="progress-fill" style="width:${done/total*100}%"></div></div>`:""}
        ${!isArchived?`<div style="margin-top:12px;border-top:1.5px solid #fff0f8;padding-top:10px">
          ${!total?`<p style="font-size:11px;color:#ccc;font-style:italic;margin-bottom:6px">No tasks yet</p>`:""}
          ${(event.tasks||[]).map(t=>`
            <div class="event-task">
              <div class="checkbox${t.done?" checked":""}" onclick="toggleTask(${t.id},${event.id})"></div>
              <div style="flex:1;min-width:0">
                <p style="font-size:13px;font-weight:600;color:#1a0010;${t.done?"text-decoration:line-through;opacity:.4":""}">${t.task}</p>
                <div style="display:flex;gap:5px;margin-top:2px;flex-wrap:wrap">
                  <span class="owner-tag">${t.owner}</span>
                  ${t.due?`<span style="font-size:10px;color:${!t.done&&t.due<todayStr?"#ff0099;font-weight:700":"#bbb"}">${!t.done&&t.due<todayStr?"⚠️ ":""}due ${fmt(t.due)}</span>`:""}
                </div>
                ${t.notes?`<p style="font-size:11px;color:#aaa;margin-top:2px;font-style:italic">${t.notes}</p>`:""}
              </div>
              <button class="edit-btn" onclick="openEtModal(${event.id},${t.id})">✏️</button>
              <button class="del-btn" onclick="deleteTask(${t.id},${event.id})">×</button>
            </div>`).join("")}
          <button class="sm-btn" style="margin-top:10px" onclick="openEtModal(${event.id})">+ Add task</button>
        </div>`:""}
      </div>`;
    };

    if(!active.length)html+=`<p style="font-size:13px;color:#ccc;font-style:italic;margin-bottom:12px">No active events</p>`;
    active.forEach(e=>{html+=renderEvent(e,false);});
    if(archived.length){
      html+=`<p class="section-label grey">📦 Old events</p>`;
      archived.forEach(e=>{html+=renderEvent(e,true);});
    }

  } else if(tab==="content"){
    html+=`<p class="section-label">📱 Content calendar</p>`;
    const order=["draft","scheduled","published"];
    const sorted=[...data.content].sort((a,b)=>order.indexOf(a.status)-order.indexOf(b.status));
    sorted.forEach(p=>{
      const sc=POST_STATUS_STYLES[p.status]||"background:#fff0f8;color:#ff0099";
      const overdue=p.status!=="published"&&p.date&&p.date<todayStr;
      html+=`<div class="card${overdue?" overdue":""}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;gap:5px;align-items:center;margin-bottom:5px;flex-wrap:wrap">
              ${p.date?`<span style="font-size:10px;color:${overdue?"#ff0099;font-weight:700":"#888"}">${overdue?"⚠️ ":""}${fmt(p.date)}</span>`:""}
              <span style="background:#fff0f8;color:#ff0099;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px">${p.platform}</span>
            </div>
            <p style="font-weight:600;color:#1a0010;font-size:13px">${p.caption}</p>
            <span class="owner-tag" style="margin-top:5px;display:inline-block">${p.owner}</span>
            <div class="status-flow">
              ${POST_STATUSES.map(s=>`<span class="status-pill${p.status===s?" active":""}" style="${POST_STATUS_STYLES[s]}" onclick="cyclePostStatus(${p.id})">${s}</span>`).join("")}
            </div>
          </div>
          <div style="display:flex;gap:2px;align-items:flex-start;flex-shrink:0">
            <button class="edit-btn" onclick="openModal('content',${p.id})">✏️</button>
            <button class="del-btn" onclick="deleteItem('content',${p.id})">×</button>
          </div>
        </div>
      </div>`;
    });

  } else if(tab==="ideas"){
    html+=`<p class="section-label">💡 Ideas — vote for your faves!</p>`;
    [...data.ideas].sort((a,b)=>b.votes-a.votes).forEach(i=>{
      html+=`<div class="card" style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;min-width:0">
          <p style="font-weight:600;color:#1a0010;font-size:14px">${i.text}</p>
          <span class="owner-tag" style="margin-top:4px;display:inline-block">💡 ${i.addedBy}</span>
        </div>
        <button class="vote-btn" onclick="voteIdea(${i.id})">▲ ${i.votes}</button>
        <button class="edit-btn" onclick="openModal('ideas',${i.id})">✏️</button>
        <button class="del-btn" onclick="deleteItem('ideas',${i.id})">×</button>
      </div>`;
    });
  }

  document.getElementById("content").innerHTML=html;
}

function initSelects(){
  ["f-owner","f-eowner","f-cowner","f-iowner","et-owner"].forEach(id=>{
    const el=document.getElementById(id);if(el)el.innerHTML=teamOpts();
  });
}

async function init(){
  initSelects();
  try{const row=await dbGet();if(row){dbRowId=row.id;if(row.data)data=JSON.parse(row.data);}}catch(e){console.error(e);}
  render();
  setInterval(async()=>{try{const row=await dbGet();if(row?.data){data=JSON.parse(row.data);render();}}catch{}},30000);
}
init();
</script>
